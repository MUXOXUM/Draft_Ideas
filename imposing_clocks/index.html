<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#111214">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <title>Imposing Clocks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="stage">
        <section class="clock-view" id="clock-view-root" aria-live="polite"></section>
    </main>

    <aside class="clock-caption" aria-live="polite">
        <h2 class="clock-caption-title" id="clock-title">24 Hour Clock</h2>
        <p class="clock-caption-hint" id="clock-hint"></p>
    </aside>
    <script src="main.js"></script>
</body>
</html>
