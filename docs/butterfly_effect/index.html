<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#04131b">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>Butterfly Effect</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1014;
      --panel: rgba(16, 22, 28, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f3f6f8;
      --muted: #92a0ab;
      --accent: #d8e7f2;
      --cyan: #8ed6ec;
      --coral: #f2a48d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 32%),
        var(--bg);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 26%);
      opacity: 1;
    }

    .shell {
      position: relative;
      height: 100vh;
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 360px);
      gap: 16px;
      overflow: hidden;
    }

    .sidebar {
      display: grid;
      gap: 16px;
      align-items: start;
      align-content: start;
      min-width: 0;
    }

    .hero,
    .controls,
    .plot-card {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 5px;
    }

    .hero {
      padding: 22px 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 48ch;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .controls {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    label {
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: var(--muted);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(4, 8, 12, 0.42);
      color: var(--text);
      font: inherit;
      font-size: 0.98rem;
      outline: none;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    input:focus {
      border-color: rgba(216, 231, 242, 0.42);
      background: rgba(4, 8, 12, 0.62);
    }

    .unit {
      padding: 11px 12px;
      color: var(--accent);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      min-width: 60px;
      text-align: center;
      font-weight: 600;
    }

    .hint,
    .stats {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .stats {
      display: grid;
      gap: 6px;
      padding-top: 2px;
    }

    .seed-line {
      font-size: 0.87rem;
      font-weight: 500;
      letter-spacing: 0;
    }

    .seed-line.base {
      color: var(--cyan);
    }

    .seed-line.variant {
      color: var(--coral);
    }

    .visuals {
      min-height: 0;
      display: block;
      overflow: hidden;
    }

    .plot-card {
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .plot-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 2px 4px 0;
    }

    .plot-title {
      margin: 0;
      letter-spacing: 0.01em;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    .seed {
      color: var(--muted);
      font-size: 0.85rem;
    }

    canvas {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background:
        linear-gradient(180deg, rgba(8, 12, 16, 0.9), rgba(5, 8, 12, 0.98));
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .caption {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
      padding: 0 4px 2px;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .shell {
        height: auto;
        min-height: 100vh;
        overflow: visible;
        grid-template-columns: 1fr;
      }

      .shell {
        padding: 16px;
      }

      canvas {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="visuals">
      <article class="plot-card">
        <div class="plot-head">
          <h2 class="plot-title">Trajectory View</h2>
        </div>
        <canvas id="canvasPlane"></canvas>
        <div class="caption">ЛКМ вращает, ПКМ или Shift + ЛКМ сдвигают, колесо меняет масштаб, двойной клик сбрасывает вид.</div>
      </article>
    </section>

    <section class="sidebar">
      <div class="hero">
        <h1>Butterfly Effect</h1>
        <p>
          Две почти одинаковые системы Лоренца со временем расходятся из-за едва заметной разницы в старте.
        </p>
      </div>

      <div class="controls">
        <label for="deltaPercent">Разница в начальных значениях</label>
        <div class="field-row">
          <input id="deltaPercent" type="number" min="0" max="10" step="0.0001" value="0.001" inputmode="decimal">
          <div class="unit">%</div>
        </div>
        <div class="stats" id="stats">
          <span class="seed-line base" id="seedA">x0 = 0.01000</span>
          <span class="seed-line variant" id="seedB">x0 = 0.01000</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SIGMA = 10;
    const RHO = 28;
    const BETA = 8 / 3;
    const DT = 0.0075;
    const STEPS_PER_FRAME = 3;
    const MAX_POINTS = 2200;
    const BASE_STATE = { x: 0.01, y: 1, z: 1.05 };
    const DEFAULT_VIEW = {
      zoom: 800,
      distance: 64,
      yaw: -0.7,
      pitch: 0.42,
      target: { x: 0, y: 0, z: 24 }
    };
    const VIEW = {
      zoom: DEFAULT_VIEW.zoom,
      distance: DEFAULT_VIEW.distance,
      yaw: DEFAULT_VIEW.yaw,
      pitch: DEFAULT_VIEW.pitch,
      target: { ...DEFAULT_VIEW.target }
    };

    const input = document.getElementById("deltaPercent");
    const stats = document.getElementById("stats");
    const seedA = document.getElementById("seedA");
    const seedB = document.getElementById("seedB");

    function createRenderer(canvas) {
      const ctx = canvas.getContext("2d");

      function resize() {
        const ratio = window.devicePixelRatio || 1;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      resize();
      window.addEventListener("resize", resize);
      return { canvas, ctx, resize };
    }

    function derivatives(point) {
      return {
        x: SIGMA * (point.y - point.x),
        y: point.x * (RHO - point.z) - point.y,
        z: point.x * point.y - BETA * point.z
      };
    }

    function stepLorenz(point) {
      const k1 = derivatives(point);
      const k2 = derivatives({
        x: point.x + (k1.x * DT) / 2,
        y: point.y + (k1.y * DT) / 2,
        z: point.z + (k1.z * DT) / 2
      });
      const k3 = derivatives({
        x: point.x + (k2.x * DT) / 2,
        y: point.y + (k2.y * DT) / 2,
        z: point.z + (k2.z * DT) / 2
      });
      const k4 = derivatives({
        x: point.x + k3.x * DT,
        y: point.y + k3.y * DT,
        z: point.z + k3.z * DT
      });

      point.x += (DT / 6) * (k1.x + 2 * k2.x + 2 * k3.x + k4.x);
      point.y += (DT / 6) * (k1.y + 2 * k2.y + 2 * k3.y + k4.y);
      point.z += (DT / 6) * (k1.z + 2 * k2.z + 2 * k3.z + k4.z);
    }

    function project(point, width, height) {
      const cosY = Math.cos(VIEW.yaw);
      const sinY = Math.sin(VIEW.yaw);
      const cosP = Math.cos(VIEW.pitch);
      const sinP = Math.sin(VIEW.pitch);
      const relative = {
        x: point.x - VIEW.target.x,
        y: point.y - VIEW.target.y,
        z: point.z - VIEW.target.z
      };

      const x1 = relative.x * cosY - relative.z * sinY;
      const z1 = relative.x * sinY + relative.z * cosY;
      const y1 = relative.y * cosP - z1 * sinP;
      const z2 = relative.y * sinP + z1 * cosP;
      const depth = Math.max(18, VIEW.distance + z2);
      const perspective = VIEW.zoom / depth;

      return {
        x: width / 2 + x1 * perspective,
        y: height / 2 - y1 * perspective
      };
    }

    const plane = createRenderer(document.getElementById("canvasPlane"));
    const systems = [
      { stroke: "#72e1ff", points: [], sim: { ...BASE_STATE } },
      { stroke: "#ff8f70", points: [], sim: { ...BASE_STATE } }
    ];
    const interaction = {
      pointerId: null,
      mode: null,
      x: 0,
      y: 0
    };

    function resetView() {
      VIEW.zoom = DEFAULT_VIEW.zoom;
      VIEW.distance = DEFAULT_VIEW.distance;
      VIEW.yaw = DEFAULT_VIEW.yaw;
      VIEW.pitch = DEFAULT_VIEW.pitch;
      VIEW.target = { ...DEFAULT_VIEW.target };
    }

    function getPanBasis() {
      const cosY = Math.cos(VIEW.yaw);
      const sinY = Math.sin(VIEW.yaw);
      const cosP = Math.cos(VIEW.pitch);
      const sinP = Math.sin(VIEW.pitch);

      return {
        right: { x: cosY, y: 0, z: -sinY },
        up: { x: sinY * sinP, y: cosP, z: cosY * sinP }
      };
    }

    function panView(deltaX, deltaY, width, height) {
      const { right, up } = getPanBasis();
      const panScale = VIEW.distance / Math.min(width, height);

      VIEW.target.x += (-deltaX * right.x + deltaY * up.x) * panScale;
      VIEW.target.y += (-deltaX * right.y + deltaY * up.y) * panScale;
      VIEW.target.z += (-deltaX * right.z + deltaY * up.z) * panScale;
    }

    function drawAxes(ctx, width, height) {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.04)";
      ctx.lineWidth = 1;
      for (let x = 48.5; x < width; x += 48) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 48.5; y < height; y += 48) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
    }

    function draw() {
      const { ctx, canvas } = plane;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(5, 8, 12, 1)";
      ctx.fillRect(0, 0, width, height);
      drawAxes(ctx, width, height);

      systems.forEach((system) => {
        if (system.points.length < 2) {
          return;
        }

        ctx.beginPath();
        system.points.forEach((point, index) => {
          const projected = project(point, width, height);
          if (index === 0) {
            ctx.moveTo(projected.x, projected.y);
          } else {
            ctx.lineTo(projected.x, projected.y);
          }
        });
        ctx.strokeStyle = system.stroke;
        ctx.lineWidth = 1.7;
        ctx.stroke();

        const head = project(system.points[system.points.length - 1], width, height);
        ctx.beginPath();
        ctx.arc(head.x, head.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = system.stroke;
        ctx.fill();
      });
    }

    function formatSeed(value) {
      return value.toFixed(10).replace(/0+$/, "").replace(/\.$/, "");
    }

    function resetSimulation() {
      const percent = Math.max(0, Number.parseFloat(input.value) || 0);
      const delta = BASE_STATE.x * (percent / 100);

      systems[0].sim = { ...BASE_STATE };
      systems[1].sim = { ...BASE_STATE, x: BASE_STATE.x + delta };
      systems[0].points = [];
      systems[1].points = [];

      seedA.textContent = "x0 = " + formatSeed(systems[0].sim.x);
      seedB.textContent = "x0 = " + formatSeed(systems[1].sim.x);
      draw();
    }

    function tick(system) {
      for (let step = 0; step < STEPS_PER_FRAME; step += 1) {
        stepLorenz(system.sim);
        system.points.push({ ...system.sim });
        if (system.points.length > MAX_POINTS) {
          system.points.shift();
        }
      }
    }

    function animate() {
      tick(systems[0]);
      tick(systems[1]);
      draw();
      requestAnimationFrame(animate);
    }

    plane.canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    plane.canvas.addEventListener("pointerdown", (event) => {
      if (interaction.pointerId !== null) {
        return;
      }

      interaction.pointerId = event.pointerId;
      interaction.mode = event.button === 1 || event.button === 2 || event.shiftKey ? "pan" : "orbit";
      interaction.x = event.clientX;
      interaction.y = event.clientY;
      plane.canvas.setPointerCapture(event.pointerId);
    });

    plane.canvas.addEventListener("pointermove", (event) => {
      if (interaction.pointerId !== event.pointerId) {
        return;
      }

      const deltaX = event.clientX - interaction.x;
      const deltaY = event.clientY - interaction.y;
      interaction.x = event.clientX;
      interaction.y = event.clientY;

      if (interaction.mode === "orbit") {
        VIEW.yaw += deltaX * 0.009;
        VIEW.pitch += deltaY * 0.0065;
        VIEW.pitch = Math.max(-1.45, Math.min(1.45, VIEW.pitch));
        return;
      }

      panView(deltaX, deltaY, plane.canvas.clientWidth, plane.canvas.clientHeight);
    });

    function endInteraction(event) {
      if (interaction.pointerId !== event.pointerId) {
        return;
      }

      if (plane.canvas.hasPointerCapture(event.pointerId)) {
        plane.canvas.releasePointerCapture(event.pointerId);
      }

      interaction.pointerId = null;
      interaction.mode = null;
    }

    plane.canvas.addEventListener("pointerup", endInteraction);
    plane.canvas.addEventListener("pointercancel", endInteraction);

    plane.canvas.addEventListener("wheel", (event) => {
      event.preventDefault();

      const zoomFactor = Math.exp(-event.deltaY * 0.0012);
      VIEW.zoom = Math.max(180, Math.min(1800, VIEW.zoom * zoomFactor));
      VIEW.distance = Math.max(32, Math.min(150, VIEW.distance / Math.sqrt(zoomFactor)));
    }, { passive: false });

    plane.canvas.addEventListener("dblclick", () => {
      resetView();
    });

    input.addEventListener("input", resetSimulation);

    resetView();
    resetSimulation();
    animate();
  </script>
</body>
</html>
