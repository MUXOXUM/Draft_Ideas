<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#050505">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>Optical Illusions</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --label: rgba(245, 245, 245, 0.92);
      --hint: rgba(190, 190, 190, 0.72);
      --text: rgba(245, 245, 245, 0.92);
      --muted: rgba(205, 205, 205, 0.8);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.04), transparent 42%),
        linear-gradient(180deg, #111111, var(--bg));
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
      align-items: center;
      gap: 32px;
      padding: 32px;
    }

    .stage__media {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .illusion {
      display: block;
      width: min(100%, 820px);
      max-height: calc(100vh - 220px);
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .stage__info {
      align-self: stretch;
      display: grid;
      align-content: center;
      gap: 18px;
      min-height: 0;
    }

    .stage__title {
      margin: 0;
      font-size: clamp(32px, 4vw, 56px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .stage__description {
      margin: 0;
      max-width: 28ch;
      font-size: clamp(16px, 1.6vw, 20px);
      line-height: 1.6;
      color: var(--muted);
    }

    .gallery-label {
      position: fixed;
      left: 24px;
      bottom: 22px;
      z-index: 1;
      pointer-events: none;
      color: var(--label);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.4);
    }

    .gallery-label__title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .gallery-label__hint {
      margin: 6px 0 0;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--hint);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      .stage {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 16px;
        overflow-y: auto;
      }

      .illusion {
        width: min(100%, 720px);
        max-height: min(40vh, 340px);
      }

      .stage__info {
        gap: 14px;
      }

      .stage__description {
        max-width: none;
      }

      .gallery-label {
        left: 16px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="sr-only">Коллекция оптических иллюзий</h1>
    <div class="stage__media">
      <img
        class="illusion"
        id="illusion"
        src="./img/hollow_mask_illusion.gif"
        alt="Оптическая иллюзия"
      >
    </div>
    <section class="stage__info" aria-live="polite">
      <h2 class="stage__title" id="illusion-title">Hollow Mask Illusion</h2>
      <p class="stage__description" id="illusion-description">
        Вогнутая маска воспринимается как выпуклое лицо, потому что мозг слишком сильно доверяет знакомой схеме человеческого лица и игнорирует реальные подсказки глубины.
      </p>
    </section>
  </main>
  <div class="gallery-label" aria-hidden="true">
    <p class="gallery-label__title">Optical Illusions</p>
    <p class="gallery-label__hint">← → or A / D</p>
  </div>

  <script>
    const illusions = [
      {
        src: "./img/hollow_mask_illusion.gif",
        title: "Hollow Mask Illusion",
        description: "Вогнутая маска воспринимается как выпуклое лицо, потому что мозг слишком сильно доверяет знакомой схеме человеческого лица и игнорирует реальные подсказки глубины."
      },
      {
        src: "./img/david_novick_illusion.jpg",
        title: "Novick Color Contrast Illusion",
        description: "Шары одного и того же цвета кажутся разными из-за контрастных полос вокруг них. Мозг оценивает оттенок не изолированно, а в зависимости от соседних цветов."
      },
      {
        src: "./img/hermann_grid.webp",
        title: "Hermann Grid",
        description: "На пересечениях белой решетки появляются мнимые серые пятна. Это связано с тем, как зрительная система усиливает контраст на границах."
      },
      {
        src: "./img/2025-08-24_22.47.44_251.jpg",
        title: "Peripheral Drift Pattern",
        description: "Статичная картинка кажется вращающейся, если смотреть краем глаза. Эффект возникает из-за последовательности контрастов и микродвижений глаз."
      },
      {
        src: "./img/phi_phenomenon.webp",
        title: "Phi Phenomenon",
        description: "Мозг склеивает последовательные затухания синих точек в одно непрерывное движение мнимого белого объекта."
      },
      {
        src: "./img/caffe_wall_illusion.jpg",
        title: "Cafe Wall Illusion",
        description: "Горизонтальные линии кажутся наклоненными из-за смещенных черных и белых плиток. Локальные контрасты сбивают оценку направления."
      },
      {
        src: "./img/2026-04-25_23.50.50_252.webp",
        title: "Motion Rings",
        description: "Кольца выглядят так, будто двигаются в стороны или изменяют свою форму, хотя их положение и размер статичны. Направленные элементы заставляют зрение достраивать движение."
      },
      {
        src: "./img/2026-03-25_19.23.55_771.jpg",
        title: "Orange Tilt Pattern",
        description: "Ряды одинаковых овалов начинают казаться изогнутыми и повернутыми. Повторяющаяся структура нарушает точную оценку ориентации."
      },
      {
        src: "./img/checker_shadow_illusion.png",
        title: "Checker Shadow Illusion",
        description: "Клетки одинаковой яркости кажутся разными из-за нарисованной тени. Мозг автоматически компенсирует освещение и ошибается в реальной светлоте."
      },
      {
        src: "./img/flash_lag_illusion.gif",
        title: "Flash-Lag Illusion",
        description: "В момент движущийся красный квадрат воспринимается чуть впереди зеленой вспышки, хотя на самом деле зеленый квадрат загорается до того как красный с ним сравняется. Мозг предсказывает траекторию и сдвигает позицию."
      }
    ];

    const image = document.getElementById("illusion");
    const title = document.getElementById("illusion-title");
    const description = document.getElementById("illusion-description");
    let currentIndex = 0;

    function showIllusion(index) {
      currentIndex = (index + illusions.length) % illusions.length;
      const illusion = illusions[currentIndex];

      image.src = illusion.src;
      image.alt = illusion.title;
      title.textContent = illusion.title;
      description.textContent = illusion.description;
    }

    function handleNavigation(event) {
      if (event.repeat) {
        return;
      }

      const key = event.key.toLowerCase();

      if (key === "arrowright" || key === "d" || key === "в") {
        event.preventDefault();
        showIllusion(currentIndex + 1);
      }

      if (key === "arrowleft" || key === "a" || key === "ф") {
        event.preventDefault();
        showIllusion(currentIndex - 1);
      }
    }

    window.addEventListener("keydown", handleNavigation);

    showIllusion(0);

    // Preload the rest of the images so page switching stays instant.
    for (const illusion of illusions.slice(1)) {
      const preload = new Image();
      preload.src = illusion.src;
    }
  </script>
</body>
</html>
