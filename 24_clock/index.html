<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24-часовые астрономические часы</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .clock-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .clock-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        .metal-ring {
            stroke: #666;
            stroke-width: 8;
            fill: none;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));
        }

        .day-section {
            fill: #fff;
            stroke: #ddd;
            stroke-width: 1;
        }

        .night-section {
            fill: #1a1a2e;
            stroke: #333;
            stroke-width: 1;
        }

        .hour-hand {
            stroke: #333;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .minute-hand {
            stroke: #666;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .second-hand {
            stroke: #ff4444;
            stroke-width: 2;
            stroke-linecap: round;
        }

        .hour-hand-night {
            stroke: #f8fafc;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .minute-hand-night {
            stroke: #f1f5f9;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .center-circle {
            fill: #666;
            stroke: #fff;
            stroke-width: 2;
        }

        .marker {
            stroke: #999;
            stroke-width: 2;
        }

        .marker-number {
            font-size: 12px;
            fill: #666;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .marker-night {
            stroke: #e2e8f0;
            stroke-width: 2;
        }

        .marker-number-night {
            font-size: 12px;
            fill: #f8fafc;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .time-info {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
        }

        .current-time {
            font-size: 2.5rem;
            font-weight: 300;
            color: #333;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .sun-times {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .sun-times div {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sun-times span:first-child {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sun-times span:last-child {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .location-control {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            background: #666;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #444;
        }

        .btn-secondary {
            background: #888;
        }

        .btn-secondary:hover {
            background: #666;
        }

        .map-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 999;
        }

        .map-modal.is-open {
            display: flex;
        }

        .map-panel {
            width: min(800px, 100%);
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .map-header h3 {
            font-size: 1.1rem;
            color: #1f2937;
            margin: 0;
        }

        #map-picker {
            width: 100%;
            height: 420px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
        }

        .map-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 12px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .current-time {
                font-size: 1.8rem;
            }

            .sun-times {
                flex-direction: column;
                gap: 10px;
            }

            .location-control {
                flex-direction: column;
                align-items: center;
            }

            #map-picker {
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <div class="clock-container">
                <svg viewBox="0 0 400 400" id="clock-svg">
                    <defs>
                        <clipPath id="night-clip" clipPathUnits="userSpaceOnUse">
                            <path id="night-clip-path" d="M 200 200 L 200 15 A 185 185 0 1 1 200 385 Z"></path>
                        </clipPath>
                    </defs>

                    <!-- Внешнее металлическое кольцо -->
                    <circle cx="200" cy="200" r="190" class="metal-ring"/>

                    <!-- Секции день/ночь будут добавлены динамически -->

                    <!-- Часовые метки -->
                    <g id="hour-markers"></g>
                    <g id="hour-markers-night" clip-path="url(#night-clip)"></g>

                    <!-- Стрелки -->
                    <g id="hands">
                        <line x1="200" y1="200" x2="200" y2="80" class="hour-hand" id="hour-hand"/>
                        <line x1="200" y1="200" x2="200" y2="60" class="minute-hand" id="minute-hand"/>
                        <line x1="200" y1="200" x2="200" y2="40" class="second-hand" id="second-hand"/>
                        <line x1="200" y1="200" x2="200" y2="80" class="hour-hand-night" id="hour-hand-night" clip-path="url(#night-clip)"/>
                        <line x1="200" y1="200" x2="200" y2="60" class="minute-hand-night" id="minute-hand-night" clip-path="url(#night-clip)"/>
                        <circle cx="200" cy="200" r="8" class="center-circle"/>
                    </g>
                </svg>
            </div>

            <div class="time-info">
                <div class="current-time" id="current-time">--:--:--</div>
                <div class="sun-times">
                    <div>
                        <span>Восход</span>
                        <span id="sunrise-time">--:--</span>
                    </div>
                    <div>
                        <span>Закат</span>
                        <span id="sunset-time">--:--</span>
                    </div>
                </div>

                <div class="location-control">
                    <button class="btn" id="pick-on-map">Выбрать на карте</button>
                </div>
            </div>
        </div>
    </div>

    <div class="map-modal" id="map-modal" aria-hidden="true">
        <div class="map-panel">
            <div class="map-header">
                <h3>Выберите город на карте</h3>
                <button class="btn btn-secondary" id="close-map">Закрыть</button>
            </div>
            <div id="map-picker"></div>
            <div class="map-actions">
                <button class="btn" id="confirm-map-point" disabled>Применить точку</button>
            </div>
        </div>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <script>
        // sun.js - Расчет солнечных данных
        const SunCalculator = (() => {
            // Получение времени восхода/заката через API
            async function getSunTimes(lat, lon) {
                try {
                    const response = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                    const data = await response.json();

                    if (data.status === 'OK') {
                        return {
                            sunrise: new Date(data.results.sunrise),
                            sunset: new Date(data.results.sunset)
                        };
                    }
                    throw new Error('Не удалось получить данные о восходе/закате');
                } catch (error) {
                    console.error('Ошибка получения солнечных данных:', error);

                    // Fallback на приблизительные значения (6:00 и 18:00)
                    const now = new Date();
                    const sunrise = new Date(now);
                    sunrise.setHours(6, 0, 0, 0);
                    const sunset = new Date(now);
                    sunset.setHours(18, 0, 0, 0);

                    return { sunrise, sunset };
                }
            }

            return {
                getSunTimes
            };
        })();

        // clock.js - Логика часов
        const Clock = (() => {
            // Москва по умолчанию
            let sunriseTime = null;
            let sunsetTime = null;
            let currentLocation = { lat: 55.7558, lon: 37.6173 }; // Москва
            let map = null;
            let selectedMapPoint = null;
            let mapMarker = null;

            // Инициализация часов
            function init() {
                createHourMarkers();
                updateClock();
                setInterval(updateClock, 1000);

                // Загружаем данные для Москвы при старте
                SunCalculator.getSunTimes(currentLocation.lat, currentLocation.lon)
                    .then(times => {
                        sunriseTime = times.sunrise;
                        sunsetTime = times.sunset;
                        updateSunInfo();
                        updateDayNightSections();
                    });

                // Обработчики кнопок
                document.getElementById('pick-on-map').addEventListener('click', openMapPicker);
                document.getElementById('close-map').addEventListener('click', closeMapPicker);
                document.getElementById('confirm-map-point').addEventListener('click', applyMapPoint);
            }

            function initializeMapIfNeeded() {
                if (map || typeof L === 'undefined') return;

                map = L.map('map-picker', { zoomControl: true }).setView([currentLocation.lat, currentLocation.lon], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

                map.on('click', (event) => {
                    selectedMapPoint = event.latlng;

                    if (!mapMarker) {
                        mapMarker = L.marker(selectedMapPoint).addTo(map);
                    } else {
                        mapMarker.setLatLng(selectedMapPoint);
                    }

                    document.getElementById('confirm-map-point').disabled = false;
                });
            }

            function openMapPicker() {
                if (typeof L === 'undefined') {
                    alert('Не удалось загрузить карту. Проверьте подключение к интернету.');
                    return;
                }

                const modal = document.getElementById('map-modal');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                initializeMapIfNeeded();

                if (map) {
                    map.setView([currentLocation.lat, currentLocation.lon], 10);
                    setTimeout(() => map.invalidateSize(), 0);
                }
            }

            function closeMapPicker() {
                const modal = document.getElementById('map-modal');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
            }

            async function applyMapPoint() {
                if (!selectedMapPoint) return;

                currentLocation = { lat: selectedMapPoint.lat, lon: selectedMapPoint.lng };
                const times = await SunCalculator.getSunTimes(currentLocation.lat, currentLocation.lon);
                sunriseTime = times.sunrise;
                sunsetTime = times.sunset;
                updateSunInfo();
                updateDayNightSections();

                closeMapPicker();
            }

            // Создание часовых меток
            function createHourMarkers() {
                const markers = document.getElementById('hour-markers');
                const markersNight = document.getElementById('hour-markers-night');
                markers.innerHTML = '';
                markersNight.innerHTML = '';

                for (let hour = 0; hour < 24; hour++) {
                    const angle = (hour * 15 - 90) * Math.PI / 180;
                    const x1 = 200 + 170 * Math.cos(angle);
                    const y1 = 200 + 170 * Math.sin(angle);
                    const x2 = 200 + 180 * Math.cos(angle);
                    const y2 = 200 + 180 * Math.sin(angle);

                    // Метка
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                    line.setAttribute('class', 'marker');
                    markers.appendChild(line);

                    const lineNight = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    lineNight.setAttribute('x1', x1);
                    lineNight.setAttribute('y1', y1);
                    lineNight.setAttribute('x2', x2);
                    lineNight.setAttribute('y2', y2);
                    lineNight.setAttribute('class', 'marker-night');
                    markersNight.appendChild(lineNight);

                    // Число
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    const textX = 200 + 140 * Math.cos(angle);
                    const textY = 200 + 140 * Math.sin(angle);
                    text.setAttribute('x', textX);
                    text.setAttribute('y', textY);
                    text.setAttribute('class', 'marker-number');
                    text.textContent = hour.toString().padStart(2, '0');
                    markers.appendChild(text);

                    const textNight = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    textNight.setAttribute('x', textX);
                    textNight.setAttribute('y', textY);
                    textNight.setAttribute('class', 'marker-number-night');
                    textNight.textContent = hour.toString().padStart(2, '0');
                    markersNight.appendChild(textNight);
                }
            }

            // Обновление секций день/ночь
            function updateDayNightSections() {
                if (!sunriseTime || !sunsetTime) return;

                const svg = document.getElementById('clock-svg');
                const existingSections = document.querySelectorAll('.day-section, .night-section');
                existingSections.forEach(el => el.remove());

                const now = new Date();
                const sunrise = new Date(sunriseTime);
                const sunset = new Date(sunsetTime);

                // Корректировка дат для текущего дня
                sunrise.setFullYear(now.getFullYear(), now.getMonth(), now.getDate());
                sunset.setFullYear(now.getFullYear(), now.getMonth(), now.getDate());

                // Функция для получения угла времени
                function getTimeAngle(date) {
                    const hours = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
                    return (hours * 15 - 90) * Math.PI / 180;
                }

                const sunriseAngle = getTimeAngle(sunrise);
                const sunsetAngle = getTimeAngle(sunset);

                // Создание секций
                function createArc(startAngle, endAngle, className, isNight = false) {
                    const startX = 200 + 185 * Math.cos(startAngle);
                    const startY = 200 + 185 * Math.sin(startAngle);
                    const endX = 200 + 185 * Math.cos(endAngle);
                    const endY = 200 + 185 * Math.sin(endAngle);

                    const largeArc = (endAngle - startAngle) % (2 * Math.PI) > Math.PI ? 1 : 0;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const d = [
                        'M', 200, 200,
                        'L', startX, startY,
                        'A', 185, 185, 0, largeArc, 1, endX, endY,
                        'Z'
                    ].join(' ');

                    path.setAttribute('d', d);
                    path.setAttribute('class', className);

                    return path;
                }

                // Добавляем дневную секцию (от восхода до заката)
                const daySection = createArc(sunriseAngle, sunsetAngle, 'day-section');
                svg.insertBefore(daySection, document.getElementById('hour-markers'));

                // Добавляем ночную секцию (от заката до восхода)
                const nightSection = createArc(sunsetAngle, sunriseAngle + 2 * Math.PI, 'night-section');
                svg.insertBefore(nightSection, document.getElementById('hour-markers'));
                const nightClipPath = document.getElementById('night-clip-path');
                nightClipPath.setAttribute('d', nightSection.getAttribute('d'));
            }

            // Обновление позиции стрелок
            function updateHands() {
                const now = new Date();
                const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
                const minutes = now.getMinutes() + now.getSeconds() / 60;
                const seconds = now.getSeconds();

                // 24-часовой формат: 360° / 24 часа = 15° в час
                const hourAngle = (hours * 15 - 90) * Math.PI / 180;
                const minuteAngle = (minutes * 6 - 90) * Math.PI / 180;
                const secondAngle = (seconds * 6 - 90) * Math.PI / 180;

                const hourHand = document.getElementById('hour-hand');
                const minuteHand = document.getElementById('minute-hand');
                const secondHand = document.getElementById('second-hand');
                const hourHandNight = document.getElementById('hour-hand-night');
                const minuteHandNight = document.getElementById('minute-hand-night');

                const hourX = 200 + 110 * Math.cos(hourAngle);
                const hourY = 200 + 110 * Math.sin(hourAngle);
                const minuteX = 200 + 140 * Math.cos(minuteAngle);
                const minuteY = 200 + 140 * Math.sin(minuteAngle);
                const secondX = 200 + 160 * Math.cos(secondAngle);
                const secondY = 200 + 160 * Math.sin(secondAngle);

                hourHand.setAttribute('x2', hourX);
                hourHand.setAttribute('y2', hourY);
                hourHandNight.setAttribute('x2', hourX);
                hourHandNight.setAttribute('y2', hourY);

                minuteHand.setAttribute('x2', minuteX);
                minuteHand.setAttribute('y2', minuteY);
                minuteHandNight.setAttribute('x2', minuteX);
                minuteHandNight.setAttribute('y2', minuteY);

                secondHand.setAttribute('x2', secondX);
                secondHand.setAttribute('y2', secondY);
            }

            // Обновление цифрового времени
            function updateDigitalTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('ru-RU');
                document.getElementById('current-time').textContent = timeString;
            }

            // Обновление информации о солнце
            function updateSunInfo() {
                if (sunriseTime && sunsetTime) {
                    document.getElementById('sunrise-time').textContent = sunriseTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    document.getElementById('sunset-time').textContent = sunsetTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                }
            }

            // Обновление всех часов
            function updateClock() {
                updateHands();
                updateDigitalTime();
            }

            return {
                init
            };
        })();

        // Запуск при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            Clock.init();
        });
    </script>
</body>
</html>
