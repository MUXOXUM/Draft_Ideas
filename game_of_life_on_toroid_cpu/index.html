<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#071108">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>GoLoT CPU</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071108;
      --bg-deep: #030704;
      --panel: rgba(5, 16, 7, 0.9);
      --panel-border: rgba(111, 255, 145, 0.25);
      --text: #9affb0;
      --muted: #5da86a;
      --accent: #d4ff63;
      --accent-strong: #7cff98;
      --glass: rgba(13, 31, 15, 0.82);
      --shadow: rgba(60, 255, 110, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      font-family: "Courier New", "Lucida Console", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(119, 255, 144, 0.11), transparent 32%),
        radial-gradient(circle at bottom, rgba(230, 255, 123, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-deep), var(--bg));
      overflow: hidden;
      text-shadow: 0 0 10px rgba(122, 255, 151, 0.18);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(120, 255, 143, 0.045) 0,
          rgba(120, 255, 143, 0.045) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.38) 100%);
    }

    .scene {
      position: relative;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      background:
        linear-gradient(90deg, rgba(30, 72, 34, 0.1) 1px, transparent 1px),
        linear-gradient(rgba(30, 72, 34, 0.1) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 100%;
      cursor: grab;
      filter: drop-shadow(0 0 20px rgba(98, 255, 115, 0.12));
    }

    canvas.dragging {
      cursor: grabbing;
    }

    @media (orientation: portrait) {
      body {
        background:
          radial-gradient(circle at top, rgba(119, 255, 144, 0.14), transparent 42%),
          radial-gradient(circle at bottom, rgba(230, 255, 123, 0.1), transparent 34%),
          linear-gradient(180deg, var(--bg-deep), var(--bg));
      }

      .scene {
        background-size: 24px 24px;
      }
    }

  </style>
</head>
<body>
  <main class="scene">
    <canvas id="scene"></canvas>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");

    const majorSegments = 72;
    const minorSegments = 40;
    const vertexCount = majorSegments * minorSegments;
    const cellCount = vertexCount;
    const baseMajorRadius = 182;
    const baseMinorRadius = 80;
    const baseCameraDistance = 640;
    const baseProjectionScale = 760;
    const simStepMs = 800;
    const autoRotationSpeed = { x: 0.00009, y: 0.00013, z: 0.00007 };
    const arcballSmoothing = 0.012;
    const arcballSensitivity = 1.65;
    const panSensitivity = 1;
    const zoomStep = 0.0012;
    const minZoom = 0.55;
    const maxZoom = 2.4;
    const lightDirection = normalize({ x: -0.45, y: -0.9, z: 1 });
    const aliveBaseColor = [171, 255, 128];
    const deadBaseColor = [143, 155, 130];
    const aliveStroke = "rgba(234, 255, 153, 0.34)";
    const deadStroke = "rgba(170, 196, 159, 0.14)";
    const initialViewQuaternion = quaternionFromEuler({ x: -0.78, y: 0.3, z: 0 });

    const majorCos = new Float32Array(majorSegments);
    const majorSin = new Float32Array(majorSegments);
    const minorCos = new Float32Array(minorSegments);
    const minorSin = new Float32Array(minorSegments);
    const majorCenterCos = new Float32Array(majorSegments);
    const majorCenterSin = new Float32Array(majorSegments);
    const minorCenterCos = new Float32Array(minorSegments);
    const minorCenterSin = new Float32Array(minorSegments);
    const prevMajorIndex = new Uint16Array(majorSegments);
    const nextMajorIndex = new Uint16Array(majorSegments);
    const prevMinorIndex = new Uint16Array(minorSegments);
    const nextMinorIndex = new Uint16Array(minorSegments);

    const cellTemplates = createCellTemplates();
    const renderCells = createRenderCells();

    const state = {
      width: 0,
      height: 0,
      centerX: 0,
      centerY: 0,
      viewQuaternion: initialViewQuaternion,
      targetViewQuaternion: initialViewQuaternion,
      spinRotation: { x: 0, y: 0, z: 0.18 },
      spinTransform: { cx: 1, sx: 0, cy: 1, sy: 0, cz: 1, sz: 0 },
      autoRotation: { ...autoRotationSpeed },
      running: true,
      dragging: false,
      dragMode: null,
      lastArcballVector: { x: 0, y: 0, z: 1 },
      lastPointer: { x: 0, y: 0 },
      panOffset: { x: 0, y: 0 },
      zoom: 1,
      generation: 0,
      accumulator: 0,
      grid: new Uint8Array(cellCount),
      nextGrid: new Uint8Array(cellCount),
      sceneMetrics: {
        majorRadius: baseMajorRadius,
        minorRadius: baseMinorRadius,
        cameraDistance: baseCameraDistance,
        projectionScale: baseProjectionScale
      },
      geometry: {
        vertices: new Float32Array(vertexCount * 3),
        normals: new Float32Array(cellCount * 3)
      },
      backgroundGradient: null,
      arcballBounds: {
        left: 0,
        top: 0,
        centerX: 0,
        centerY: 0,
        radius: 1
      }
    };

    initializeLookupTables();

    function initializeLookupTables() {
      const fullTurn = Math.PI * 2;
      const du = fullTurn / majorSegments;
      const dv = fullTurn / minorSegments;

      for (let i = 0; i < majorSegments; i += 1) {
        const angle = i * du;
        const centerAngle = angle + du * 0.5;
        majorCos[i] = Math.cos(angle);
        majorSin[i] = Math.sin(angle);
        majorCenterCos[i] = Math.cos(centerAngle);
        majorCenterSin[i] = Math.sin(centerAngle);
        prevMajorIndex[i] = (i + majorSegments - 1) % majorSegments;
        nextMajorIndex[i] = (i + 1) % majorSegments;
      }

      for (let j = 0; j < minorSegments; j += 1) {
        const angle = j * dv;
        const centerAngle = angle + dv * 0.5;
        minorCos[j] = Math.cos(angle);
        minorSin[j] = Math.sin(angle);
        minorCenterCos[j] = Math.cos(centerAngle);
        minorCenterSin[j] = Math.sin(centerAngle);
        prevMinorIndex[j] = (j + minorSegments - 1) % minorSegments;
        nextMinorIndex[j] = (j + 1) % minorSegments;
      }
    }

    function createCellTemplates() {
      const templates = new Array(cellCount);

      for (let i = 0; i < majorSegments; i += 1) {
        const nextI = (i + 1) % majorSegments;
        for (let j = 0; j < minorSegments; j += 1) {
          const nextJ = (j + 1) % minorSegments;
          const cellIndex = i * minorSegments + j;

          templates[cellIndex] = {
            gridIndex: cellIndex,
            cornerIndices: [
              i * minorSegments + j,
              nextI * minorSegments + j,
              nextI * minorSegments + nextJ,
              i * minorSegments + nextJ
            ],
            normalIndex: cellIndex
          };
        }
      }

      return templates;
    }

    function createRenderCells() {
      return Array.from({ length: cellCount }, () => ({
        points: [
          { x: 0, y: 0, depth: 0 },
          { x: 0, y: 0, depth: 0 },
          { x: 0, y: 0, depth: 0 },
          { x: 0, y: 0, depth: 0 }
        ],
        fill: "",
        stroke: deadStroke,
        lineWidth: 0.75,
        depth: 0
      }));
    }

    function fillGrid(grid, fillRandom) {
      for (let index = 0; index < grid.length; index += 1) {
        grid[index] = fillRandom && Math.random() > 0.68 ? 1 : 0;
      }
    }

    function randomizeGrid() {
      fillGrid(state.grid, true);
      fillGrid(state.nextGrid, false);
      state.generation = 0;
      state.running = true;
      state.autoRotation = { ...autoRotationSpeed };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function nextGeneration() {
      const current = state.grid;
      const next = state.nextGrid;

      for (let i = 0; i < majorSegments; i += 1) {
        const rowOffset = i * minorSegments;
        const prevRowOffset = prevMajorIndex[i] * minorSegments;
        const nextRowOffset = nextMajorIndex[i] * minorSegments;

        for (let j = 0; j < minorSegments; j += 1) {
          const prevJ = prevMinorIndex[j];
          const nextJ = nextMinorIndex[j];
          const index = rowOffset + j;

          const neighbors =
            current[prevRowOffset + prevJ] +
            current[prevRowOffset + j] +
            current[prevRowOffset + nextJ] +
            current[rowOffset + prevJ] +
            current[rowOffset + nextJ] +
            current[nextRowOffset + prevJ] +
            current[nextRowOffset + j] +
            current[nextRowOffset + nextJ];

          const alive = current[index];
          next[index] = neighbors === 3 || (alive && neighbors === 2) ? 1 : 0;
        }
      }

      state.grid = next;
      state.nextGrid = current;
      state.generation += 1;
    }

    function updateArcballBounds(rect) {
      state.arcballBounds.left = rect.left;
      state.arcballBounds.top = rect.top;
      state.arcballBounds.centerX = rect.width * 0.5;
      state.arcballBounds.centerY = rect.height * 0.5;
      state.arcballBounds.radius = Math.min(rect.width, rect.height) * 0.5 || 1;
    }

    function rebuildGeometry() {
      const vertices = state.geometry.vertices;
      const normals = state.geometry.normals;
      const { majorRadius, minorRadius } = state.sceneMetrics;

      for (let i = 0; i < majorSegments; i += 1) {
        for (let j = 0; j < minorSegments; j += 1) {
          const vertexOffset = (i * minorSegments + j) * 3;
          const ring = majorRadius + minorRadius * minorCos[j];

          vertices[vertexOffset] = ring * majorCos[i];
          vertices[vertexOffset + 1] = ring * majorSin[i];
          vertices[vertexOffset + 2] = minorRadius * minorSin[j];

          normals[vertexOffset] = majorCenterCos[i] * minorCenterCos[j];
          normals[vertexOffset + 1] = majorCenterSin[i] * minorCenterCos[j];
          normals[vertexOffset + 2] = minorCenterSin[j];
        }
      }
    }

    function rebuildBackgroundGradient() {
      const gradient = ctx.createRadialGradient(
        state.width * 0.62,
        state.height * 0.35,
        20,
        state.width * 0.52,
        state.height * 0.52,
        Math.max(state.width, state.height) * 0.7
      );
      gradient.addColorStop(0, "rgba(117, 255, 132, 0.1)");
      gradient.addColorStop(0.4, "rgba(14, 31, 15, 0.18)");
      gradient.addColorStop(1, "rgba(3, 8, 4, 0)");
      state.backgroundGradient = gradient;
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const shortestSide = Math.min(rect.width, rect.height);
      const isPortrait = rect.height > rect.width;
      const scale = Math.max(0.68, Math.min(1.12, shortestSide / 390));

      state.width = rect.width;
      state.height = rect.height;
      state.centerX = rect.width * 0.5;
      state.centerY = rect.height * 0.5;
      state.sceneMetrics = {
        majorRadius: baseMajorRadius * (isPortrait ? scale * 0.9 : scale),
        minorRadius: baseMinorRadius * (isPortrait ? scale * 0.92 : scale),
        cameraDistance: baseCameraDistance * (isPortrait ? 0.95 : 1),
        projectionScale: baseProjectionScale * (isPortrait ? scale * 0.82 : scale)
      };

      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      updateArcballBounds(rect);
      rebuildGeometry();
      rebuildBackgroundGradient();
    }

    function normalize(vector) {
      const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
      return {
        x: vector.x / length,
        y: vector.y / length,
        z: vector.z / length
      };
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function cross(a, b) {
      return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x
      };
    }

    function normalizeQuaternion(quaternion) {
      const length = Math.hypot(quaternion.w, quaternion.x, quaternion.y, quaternion.z) || 1;
      return {
        w: quaternion.w / length,
        x: quaternion.x / length,
        y: quaternion.y / length,
        z: quaternion.z / length
      };
    }

    function multiplyQuaternions(a, b) {
      return normalizeQuaternion({
        w: a.w * b.w - a.x * b.x - a.y * b.y - a.z * b.z,
        x: a.w * b.x + a.x * b.w + a.y * b.z - a.z * b.y,
        y: a.w * b.y - a.x * b.z + a.y * b.w + a.z * b.x,
        z: a.w * b.z + a.x * b.y - a.y * b.x + a.z * b.w
      });
    }

    function quaternionFromAxisAngle(axis, angle) {
      const halfAngle = angle * 0.5;
      const sinHalf = Math.sin(halfAngle);
      return normalizeQuaternion({
        w: Math.cos(halfAngle),
        x: axis.x * sinHalf,
        y: axis.y * sinHalf,
        z: axis.z * sinHalf
      });
    }

    function quaternionBetweenVectors(from, to) {
      const axis = cross(from, to);
      const axisLength = Math.hypot(axis.x, axis.y, axis.z);
      const alignment = Math.max(-1, Math.min(1, dot(from, to)));

      if (axisLength < 1e-6) {
        if (alignment > 0.999999) {
          return { w: 1, x: 0, y: 0, z: 0 };
        }

        const fallbackAxis = Math.abs(from.x) < 0.9
          ? normalize(cross(from, { x: 1, y: 0, z: 0 }))
          : normalize(cross(from, { x: 0, y: 1, z: 0 }));
        return quaternionFromAxisAngle(fallbackAxis, Math.PI);
      }

      return quaternionFromAxisAngle(
        {
          x: axis.x / axisLength,
          y: axis.y / axisLength,
          z: axis.z / axisLength
        },
        Math.acos(alignment) * arcballSensitivity
      );
    }

    function quaternionFromEuler(rotation) {
      const qx = quaternionFromAxisAngle({ x: 1, y: 0, z: 0 }, rotation.x || 0);
      const qy = quaternionFromAxisAngle({ x: 0, y: 1, z: 0 }, rotation.y || 0);
      const qz = quaternionFromAxisAngle({ x: 0, y: 0, z: 1 }, rotation.z || 0);
      return multiplyQuaternions(qz, multiplyQuaternions(qy, qx));
    }

    function slerpQuaternions(from, to, t) {
      let target = to;
      let cosine = from.w * to.w + from.x * to.x + from.y * to.y + from.z * to.z;

      if (cosine < 0) {
        cosine = -cosine;
        target = {
          w: -to.w,
          x: -to.x,
          y: -to.y,
          z: -to.z
        };
      }

      if (cosine > 0.9995) {
        return normalizeQuaternion({
          w: from.w + (target.w - from.w) * t,
          x: from.x + (target.x - from.x) * t,
          y: from.y + (target.y - from.y) * t,
          z: from.z + (target.z - from.z) * t
        });
      }

      const theta = Math.acos(Math.max(-1, Math.min(1, cosine)));
      const sinTheta = Math.sin(theta);
      const fromWeight = Math.sin((1 - t) * theta) / sinTheta;
      const toWeight = Math.sin(t * theta) / sinTheta;

      return normalizeQuaternion({
        w: from.w * fromWeight + target.w * toWeight,
        x: from.x * fromWeight + target.x * toWeight,
        y: from.y * fromWeight + target.y * toWeight,
        z: from.z * fromWeight + target.z * toWeight
      });
    }

    function updateSpinTransform() {
      state.spinTransform.cx = Math.cos(state.spinRotation.x);
      state.spinTransform.sx = Math.sin(state.spinRotation.x);
      state.spinTransform.cy = Math.cos(state.spinRotation.y);
      state.spinTransform.sy = Math.sin(state.spinRotation.y);
      state.spinTransform.cz = Math.cos(state.spinRotation.z);
      state.spinTransform.sz = Math.sin(state.spinRotation.z);
    }

    function transformPoint(x, y, z, out) {
      const spin = state.spinTransform;
      const quaternion = state.viewQuaternion;

      let ry = y * spin.cx - z * spin.sx;
      let rz = y * spin.sx + z * spin.cx;
      y = ry;
      z = rz;

      let rx = x * spin.cy + z * spin.sy;
      rz = -x * spin.sy + z * spin.cy;
      x = rx;
      z = rz;

      rx = x * spin.cz - y * spin.sz;
      ry = x * spin.sz + y * spin.cz;
      x = rx;
      y = ry;

      const uvx = quaternion.y * z - quaternion.z * y;
      const uvy = quaternion.z * x - quaternion.x * z;
      const uvz = quaternion.x * y - quaternion.y * x;
      const uuvx = quaternion.y * uvz - quaternion.z * uvy;
      const uuvy = quaternion.z * uvx - quaternion.x * uvz;
      const uuvz = quaternion.x * uvy - quaternion.y * uvx;

      out.x = x + 2 * (quaternion.w * uvx + uuvx);
      out.y = y + 2 * (quaternion.w * uvy + uuvy);
      out.z = z + 2 * (quaternion.w * uvz + uuvz);
    }

    function projectTransformedPoint(point, out) {
      const depth = point.z + state.sceneMetrics.cameraDistance;
      const scale = state.sceneMetrics.projectionScale * state.zoom / depth;
      out.x = point.x * scale + state.centerX + state.panOffset.x;
      out.y = point.y * scale + state.centerY + state.panOffset.y;
      out.depth = depth;
    }

    function projectPointerToArcball(event) {
      const bounds = state.arcballBounds;
      const x = (bounds.centerX - (event.clientX - bounds.left)) / bounds.radius;
      const y = (bounds.centerY - (event.clientY - bounds.top)) / bounds.radius;
      const lengthSquared = x * x + y * y;

      if (lengthSquared <= 1) {
        return {
          x,
          y,
          z: Math.sqrt(1 - lengthSquared)
        };
      }

      const scale = 1 / Math.sqrt(lengthSquared);
      return {
        x: x * scale,
        y: y * scale,
        z: 0
      };
    }

    function shadeColor(base, intensity) {
      const mix = Math.max(0, Math.min(1, intensity));
      const r = Math.round(base[0] * mix);
      const g = Math.round(base[1] * mix);
      const b = Math.round(base[2] * mix);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function drawCell(cell) {
      ctx.beginPath();
      ctx.moveTo(cell.points[0].x, cell.points[0].y);
      ctx.lineTo(cell.points[1].x, cell.points[1].y);
      ctx.lineTo(cell.points[2].x, cell.points[2].y);
      ctx.lineTo(cell.points[3].x, cell.points[3].y);
      ctx.closePath();
      ctx.fillStyle = cell.fill;
      ctx.fill();
      ctx.strokeStyle = cell.stroke;
      ctx.lineWidth = cell.lineWidth;
      ctx.stroke();
    }

    function buildCells() {
      const transformedPoint = { x: 0, y: 0, z: 0 };
      const transformedNormal = { x: 0, y: 0, z: 0 };
      const vertices = state.geometry.vertices;
      const normals = state.geometry.normals;
      const cells = renderCells;
      const grid = state.grid;

      for (let index = 0; index < cellTemplates.length; index += 1) {
        const template = cellTemplates[index];
        const cell = cells[index];
        const points = cell.points;
        const cornerIndices = template.cornerIndices;
        let depthSum = 0;

        for (let pointIndex = 0; pointIndex < 4; pointIndex += 1) {
          const vertexOffset = cornerIndices[pointIndex] * 3;
          transformPoint(
            vertices[vertexOffset],
            vertices[vertexOffset + 1],
            vertices[vertexOffset + 2],
            transformedPoint
          );
          projectTransformedPoint(transformedPoint, points[pointIndex]);
          depthSum += points[pointIndex].depth;
        }

        const normalOffset = template.normalIndex * 3;
        transformPoint(
          normals[normalOffset],
          normals[normalOffset + 1],
          normals[normalOffset + 2],
          transformedNormal
        );

        const lightness = Math.max(
          0.12,
          transformedNormal.x * lightDirection.x +
            transformedNormal.y * lightDirection.y +
            transformedNormal.z * lightDirection.z
        );
        const alive = grid[template.gridIndex] === 1;
        const mix = 0.65 + lightness * 0.5;

        cell.fill = shadeColor(alive ? aliveBaseColor : deadBaseColor, mix);
        cell.stroke = alive ? aliveStroke : deadStroke;
        cell.lineWidth = alive ? 1.15 : 0.75;
        cell.depth = depthSum * 0.25;
      }

      cells.sort((a, b) => b.depth - a.depth);
      return cells;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);
      ctx.fillStyle = "rgb(3, 8, 4)";
      ctx.fillRect(0, 0, state.width, state.height);
      ctx.fillStyle = state.backgroundGradient;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function render() {
      drawBackground();
      const cells = buildCells();
      for (let index = 0; index < cells.length; index += 1) {
        drawCell(cells[index]);
      }
    }

    function tick(deltaMs) {
      const smoothing = 1 - Math.exp(-arcballSmoothing * deltaMs);
      state.viewQuaternion = slerpQuaternions(state.viewQuaternion, state.targetViewQuaternion, smoothing);

      if (state.running) {
        state.spinRotation.x += state.autoRotation.x * deltaMs;
        state.spinRotation.y += state.autoRotation.y * deltaMs;
        state.spinRotation.z += state.autoRotation.z * deltaMs;
        state.accumulator += deltaMs;

        while (state.accumulator >= simStepMs) {
          state.accumulator -= simStepMs;
          nextGeneration();
        }
      }

      updateSpinTransform();
    }

    let previousFrame = performance.now();
    function frame(now) {
      const delta = Math.min(32, now - previousFrame);
      previousFrame = now;
      tick(delta);
      render();
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerdown", (event) => {
      updateArcballBounds(canvas.getBoundingClientRect());

      if (event.button === 2 || event.button === 1) {
        state.dragMode = "pan";
        state.lastPointer.x = event.clientX;
        state.lastPointer.y = event.clientY;
      } else {
        state.dragMode = "rotate";
        state.lastArcballVector = projectPointerToArcball(event);
      }

      state.dragging = true;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.dragging) {
        return;
      }

      if (state.dragMode === "pan") {
        state.panOffset.x += (event.clientX - state.lastPointer.x) * panSensitivity;
        state.panOffset.y += (event.clientY - state.lastPointer.y) * panSensitivity;
        state.lastPointer.x = event.clientX;
        state.lastPointer.y = event.clientY;
        return;
      }

      const currentArcballVector = projectPointerToArcball(event);
      const deltaQuaternion = quaternionBetweenVectors(state.lastArcballVector, currentArcballVector);
      state.targetViewQuaternion = multiplyQuaternions(deltaQuaternion, state.targetViewQuaternion);
      state.lastArcballVector = currentArcballVector;
    });

    function stopDragging(event) {
      state.dragging = false;
      state.dragMode = null;
      canvas.classList.remove("dragging");
      if (event) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", stopDragging);
    canvas.addEventListener("pointerleave", () => {
      state.dragging = false;
      state.dragMode = null;
      canvas.classList.remove("dragging");
    });
    canvas.addEventListener("pointercancel", stopDragging);
    canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      state.zoom = clamp(state.zoom * Math.exp(-event.deltaY * zoomStep), minZoom, maxZoom);
    }, { passive: false });
    canvas.addEventListener("dblclick", () => {
      state.targetViewQuaternion = initialViewQuaternion;
      state.viewQuaternion = initialViewQuaternion;
      state.panOffset.x = 0;
      state.panOffset.y = 0;
      state.zoom = 1;
    });

    window.addEventListener("resize", resize);

    randomizeGrid();
    resize();
    updateSpinTransform();
    render();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
