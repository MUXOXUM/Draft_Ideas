<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoLoT</title>
  <style>
    :root {
      --bg: #071108;
      --bg-deep: #030704;
      --panel: rgba(5, 16, 7, 0.9);
      --panel-border: rgba(111, 255, 145, 0.25);
      --text: #9affb0;
      --muted: #5da86a;
      --accent: #d4ff63;
      --accent-strong: #7cff98;
      --glass: rgba(13, 31, 15, 0.82);
      --shadow: rgba(60, 255, 110, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", "Lucida Console", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(119, 255, 144, 0.11), transparent 32%),
        radial-gradient(circle at bottom, rgba(230, 255, 123, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-deep), var(--bg));
      overflow: hidden;
      text-shadow: 0 0 10px rgba(122, 255, 151, 0.18);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(120, 255, 143, 0.045) 0,
          rgba(120, 255, 143, 0.045) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.38) 100%);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(420px, 520px) 1fr;
    }

    .panel {
      padding: 30px 32px;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 2;
      box-shadow: inset -1px 0 0 rgba(212, 255, 99, 0.12), 0 0 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.7rem);
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(212, 255, 99, 0.28);
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 42ch;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    button {
      border: 1px solid var(--panel-border);
      border-radius: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35), 0 0 16px rgba(100, 255, 140, 0.08);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35), 0 0 24px rgba(212, 255, 99, 0.16);
    }

    .primary {
      color: #081007;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    .secondary {
      color: var(--text);
      background: rgba(75, 120, 78, 0.16);
    }

    .stats,
    .tips,
    .console-box {
      padding: 16px 18px;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(17, 38, 19, 0.85), rgba(8, 18, 10, 0.9));
      border: 1px solid rgba(111, 255, 145, 0.18);
      box-shadow: inset 0 0 0 1px rgba(180, 255, 162, 0.04);
    }

    .stats p,
    .tips p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      padding: 12px 14px;
      border-radius: 0;
      background: rgba(9, 22, 11, 0.84);
      border: 1px solid rgba(111, 255, 145, 0.12);
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      align-items: center;
      gap: 12px;
    }

    .metric-label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent);
      text-align: right;
    }

    .console-box {
      display: grid;
      gap: 10px;
    }

    .console-box-title {
      color: var(--accent);
      font-size: 0.84rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .console-row {
      display: grid;
      grid-template-columns: minmax(130px, 170px) 1fr;
      gap: 12px;
      align-items: start;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .console-key {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .console-value {
      color: var(--text);
    }

    .console-status {
      color: var(--accent);
    }

    .button-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .button-label::before {
      content: ">";
      color: currentColor;
    }

    .button-key {
      color: rgba(8, 16, 7, 0.75);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    .secondary .button-key {
      color: var(--muted);
    }

    .scene {
      position: relative;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(30, 72, 34, 0.1) 1px, transparent 1px),
        linear-gradient(rgba(30, 72, 34, 0.1) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      filter: drop-shadow(0 0 20px rgba(98, 255, 115, 0.12));
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .console-label {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid rgba(111, 255, 145, 0.18);
      background: rgba(10, 25, 11, 0.82);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .console-label::before {
      content: ">";
      color: var(--accent-strong);
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel {
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }

      .scene {
        min-height: 58vh;
      }
    }

    @media (max-width: 560px) {
      .metric,
      .console-row {
        grid-template-columns: 1fr;
      }

      .metric-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Game of Life on Toroid</h1>
      <p class="lead">
        После нажатия игра жизни случайно заселяет клетки поверхности
        и начинает вращать фигуру по всем трём осям.
        Управление: тяните мышью, чтобы вручную вращать тор.
      </p>

      <div class="controls">
        <button class="primary" id="startButton">
          <span class="button-label">Запуск</span>
          <span class="button-key">RUN</span>
        </button>
        <button class="secondary" id="pauseButton">
          <span class="button-label">Пауза</span>
          <span class="button-key">HOLD</span>
        </button>
        <button class="secondary" id="resetButton">
          <span class="button-label">Сброс</span>
          <span class="button-key">INIT</span>
        </button>
      </div>

      <section class="stats">
        <div class="console-box-title">Telemetry</div>
        <div class="metrics">
          <div class="metric">
            <span class="metric-label">Поколение</span>
            <span class="metric-value" id="generationValue">0</span>
          </div>
          <div class="metric">
            <span class="metric-label">Живые клетки</span>
            <span class="metric-value" id="aliveValue">0</span>
          </div>
        </div>
      </section>
    </aside>

    <main class="scene">
      <canvas id="scene"></canvas>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const pauseButtonLabel = pauseButton.querySelector(".button-label");
    const pauseButtonKey = pauseButton.querySelector(".button-key");
    const generationValue = document.getElementById("generationValue");
    const aliveValue = document.getElementById("aliveValue");
    const statusText = document.getElementById("statusText");

    const majorSegments = 44;
    const minorSegments = 26;
    const majorRadius = 170;
    const minorRadius = 74;
    const cameraDistance = 640;
    const projectionScale = 760;
    const simStepMs = 800;

    const state = {
      width: 0,
      height: 0,
      viewRotation: { x: -0.78, y: 0.3, z: 0 },
      spinRotation: { x: 0, y: 0, z: 0.18 },
      autoRotation: { x: 0, y: 0, z: 0 },
      started: false,
      running: false,
      dragging: false,
      lastPointer: { x: 0, y: 0 },
      generation: 0,
      accumulator: 0,
      grid: createGrid(false)
    };

    function createGrid(fillRandom) {
      return Array.from({ length: majorSegments }, () =>
        Array.from({ length: minorSegments }, () => fillRandom ? Math.random() > 0.68 : false)
      );
    }

    function randomizeGrid() {
      state.grid = createGrid(true);
      state.generation = 0;
      state.started = true;
      state.running = true;
      state.autoRotation = { x: 0.00009, y: 0.00013, z: 0.00007 };
      updateStats();
      setStatus("Статус: симуляция запущена.");
    }

    function resetGrid() {
      state.grid = createGrid(false);
      state.generation = 0;
      state.started = false;
      state.running = false;
      state.accumulator = 0;
      state.autoRotation = { x: 0, y: 0, z: 0 };
      state.viewRotation = { x: -0.78, y: 0.3, z: 0 };
      state.spinRotation = { x: 0, y: 0, z: 0.18 };
      updateStats();
      setStatus("Статус: ожидание запуска.");
    }

    function setStatus(text) {
      statusText.textContent = text.replace(/^Статус:\s*/i, "").replace(/\.$/, "");
    }

    function countAlive() {
      let alive = 0;
      for (const row of state.grid) {
        for (const cell of row) {
          if (cell) {
            alive += 1;
          }
        }
      }
      return alive;
    }

    function updateStats() {
      generationValue.textContent = String(state.generation);
      aliveValue.textContent = String(countAlive());
      pauseButtonLabel.textContent = state.running ? "Пауза" : "Продолжить";
      pauseButtonKey.textContent = state.running ? "HOLD" : "CONT";
    }

    function wrap(value, size) {
      return (value + size) % size;
    }

    function nextGeneration() {
      const next = createGrid(false);

      for (let i = 0; i < majorSegments; i += 1) {
        for (let j = 0; j < minorSegments; j += 1) {
          let neighbors = 0;

          for (let di = -1; di <= 1; di += 1) {
            for (let dj = -1; dj <= 1; dj += 1) {
              if (di === 0 && dj === 0) {
                continue;
              }

              if (state.grid[wrap(i + di, majorSegments)][wrap(j + dj, minorSegments)]) {
                neighbors += 1;
              }
            }
          }

          const alive = state.grid[i][j];
          next[i][j] = neighbors === 3 || (alive && neighbors === 2);
        }
      }

      state.grid = next;
      state.generation += 1;
      updateStats();
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      state.width = rect.width;
      state.height = rect.height;
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function torusPoint(u, v) {
      const cu = Math.cos(u);
      const su = Math.sin(u);
      const cv = Math.cos(v);
      const sv = Math.sin(v);
      const ring = majorRadius + minorRadius * cv;

      return {
        x: ring * cu,
        y: ring * su,
        z: minorRadius * sv
      };
    }

    function torusNormal(u, v) {
      return normalize({
        x: Math.cos(u) * Math.cos(v),
        y: Math.sin(u) * Math.cos(v),
        z: Math.sin(v)
      });
    }

    function applyRotation(point, rotation) {
      let { x, y, z } = point;

      const cx = Math.cos(rotation.x || 0);
      const sx = Math.sin(rotation.x || 0);
      let ry = y * cx - z * sx;
      let rz = y * sx + z * cx;
      y = ry;
      z = rz;

      const cy = Math.cos(rotation.y || 0);
      const sy = Math.sin(rotation.y || 0);
      let rx = x * cy + z * sy;
      rz = -x * sy + z * cy;
      x = rx;
      z = rz;

      const cz = Math.cos(rotation.z || 0);
      const sz = Math.sin(rotation.z || 0);
      rx = x * cz - y * sz;
      ry = x * sz + y * cz;

      return { x: rx, y: ry, z };
    }

    function rotatePoint(point) {
      const spun = applyRotation(point, state.spinRotation);
      return applyRotation(spun, state.viewRotation);
    }

    function normalize(vector) {
      const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
      return {
        x: vector.x / length,
        y: vector.y / length,
        z: vector.z / length
      };
    }

    function project(point) {
      const depth = point.z + cameraDistance;
      const scale = projectionScale / depth;
      return {
        x: point.x * scale + state.width / 2,
        y: point.y * scale + state.height / 2,
        depth
      };
    }

    function shadeColor(base, intensity) {
      const mix = Math.max(0, Math.min(1, intensity));
      const r = Math.round(base[0] * mix);
      const g = Math.round(base[1] * mix);
      const b = Math.round(base[2] * mix);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function drawCell(cell) {
      ctx.beginPath();
      ctx.moveTo(cell.points[0].x, cell.points[0].y);
      for (let index = 1; index < cell.points.length; index += 1) {
        ctx.lineTo(cell.points[index].x, cell.points[index].y);
      }
      ctx.closePath();
      ctx.fillStyle = cell.fill;
      ctx.fill();
      ctx.strokeStyle = cell.stroke;
      ctx.lineWidth = cell.lineWidth;
      ctx.stroke();
    }

    function buildCells() {
      const cells = [];
      const du = (Math.PI * 2) / majorSegments;
      const dv = (Math.PI * 2) / minorSegments;
      const light = normalize({ x: -0.45, y: -0.9, z: 1 });

      for (let i = 0; i < majorSegments; i += 1) {
        const u = i * du;
        const uNext = (i + 1) * du;

        for (let j = 0; j < minorSegments; j += 1) {
          const v = j * dv;
          const vNext = (j + 1) * dv;
          const centerU = u + du * 0.5;
          const centerV = v + dv * 0.5;

          const corners = [
            rotatePoint(torusPoint(u, v)),
            rotatePoint(torusPoint(uNext, v)),
            rotatePoint(torusPoint(uNext, vNext)),
            rotatePoint(torusPoint(u, vNext))
          ];

          const normal = rotatePoint(torusNormal(centerU, centerV));
          const lightness = Math.max(0.12, normal.x * light.x + normal.y * light.y + normal.z * light.z);
          const projected = corners.map(project);
          const avgDepth = projected.reduce((sum, point) => sum + point.depth, 0) / projected.length;
          const alive = state.grid[i][j];

          const baseColor = alive ? [142, 255, 128] : [130, 142, 120];
          const altColor = alive ? [245, 255, 129] : [178, 190, 156];
          const mix = 0.65 + lightness * 0.5;
          const fill = shadeColor([
            Math.round(baseColor[0] * 0.72 + altColor[0] * 0.28),
            Math.round(baseColor[1] * 0.72 + altColor[1] * 0.28),
            Math.round(baseColor[2] * 0.72 + altColor[2] * 0.28)
          ], mix);

          cells.push({
            points: projected,
            fill,
            stroke: alive ? "rgba(234, 255, 153, 0.34)" : "rgba(170, 196, 159, 0.14)",
            lineWidth: alive ? 1.15 : 0.75,
            depth: avgDepth
          });
        }
      }

      cells.sort((a, b) => b.depth - a.depth);
      return cells;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);
      ctx.fillStyle = "rgb(3, 8, 4)";
      ctx.fillRect(0, 0, state.width, state.height);

      const gradient = ctx.createRadialGradient(
        state.width * 0.62,
        state.height * 0.35,
        20,
        state.width * 0.52,
        state.height * 0.52,
        Math.max(state.width, state.height) * 0.7
      );
      gradient.addColorStop(0, "rgba(117, 255, 132, 0.1)");
      gradient.addColorStop(0.4, "rgba(14, 31, 15, 0.18)");
      gradient.addColorStop(1, "rgba(3, 8, 4, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function render() {
      drawBackground();
      const cells = buildCells();
      for (const cell of cells) {
        drawCell(cell);
      }
    }

    function tick(deltaMs) {
      if (state.running) {
        state.spinRotation.x += state.autoRotation.x * deltaMs;
        state.spinRotation.y += state.autoRotation.y * deltaMs;
        state.spinRotation.z += state.autoRotation.z * deltaMs;
        state.accumulator += deltaMs;

        while (state.accumulator >= simStepMs) {
          state.accumulator -= simStepMs;
          nextGeneration();
        }
      }
    }

    let previousFrame = performance.now();
    function frame(now) {
      const delta = Math.min(32, now - previousFrame);
      previousFrame = now;
      tick(delta);
      render();
      requestAnimationFrame(frame);
    }

    startButton.addEventListener("click", () => {
      if (!state.started) {
        randomizeGrid();
        return;
      }

      state.running = true;
      state.autoRotation = { x: 0.00009, y: 0.00013, z: 0.00007 };
      updateStats();
      setStatus("Статус: симуляция продолжена.");
    });

    pauseButton.addEventListener("click", () => {
      if (!state.started) {
        return;
      }

      state.running = !state.running;
      state.autoRotation = state.running ? { x: 0.00009, y: 0.00013, z: 0.00007 } : { x: 0, y: 0, z: 0 };
      updateStats();
      setStatus(state.running ? "Статус: симуляция продолжена." : "Статус: пауза.");
    });

    resetButton.addEventListener("click", resetGrid);

    canvas.addEventListener("pointerdown", (event) => {
      state.dragging = true;
      state.lastPointer.x = event.clientX;
      state.lastPointer.y = event.clientY;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.dragging) {
        return;
      }

      const dx = event.clientX - state.lastPointer.x;
      const dy = event.clientY - state.lastPointer.y;
      state.lastPointer.x = event.clientX;
      state.lastPointer.y = event.clientY;

      state.viewRotation.y += dx * 0.006;
      state.viewRotation.x += dy * 0.006;
    });

    function stopDragging(event) {
      state.dragging = false;
      canvas.classList.remove("dragging");
      if (event) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", stopDragging);
    canvas.addEventListener("pointerleave", () => {
      state.dragging = false;
      canvas.classList.remove("dragging");
    });
    canvas.addEventListener("pointercancel", stopDragging);

    window.addEventListener("resize", resize);

    resize();
    updateStats();
    render();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
