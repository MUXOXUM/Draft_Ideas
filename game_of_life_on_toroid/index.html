<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoLoT</title>
  <style>
    :root {
      --bg: #071108;
      --bg-deep: #030704;
      --panel: rgba(5, 16, 7, 0.9);
      --panel-border: rgba(111, 255, 145, 0.25);
      --text: #9affb0;
      --muted: #5da86a;
      --accent: #d4ff63;
      --accent-strong: #7cff98;
      --glass: rgba(13, 31, 15, 0.82);
      --shadow: rgba(60, 255, 110, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      font-family: "Courier New", "Lucida Console", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(119, 255, 144, 0.11), transparent 32%),
        radial-gradient(circle at bottom, rgba(230, 255, 123, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-deep), var(--bg));
      overflow: hidden;
      text-shadow: 0 0 10px rgba(122, 255, 151, 0.18);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(120, 255, 143, 0.045) 0,
          rgba(120, 255, 143, 0.045) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.38) 100%);
    }

    .scene {
      position: relative;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      background:
        linear-gradient(90deg, rgba(30, 72, 34, 0.1) 1px, transparent 1px),
        linear-gradient(rgba(30, 72, 34, 0.1) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 100%;
      cursor: grab;
      filter: drop-shadow(0 0 20px rgba(98, 255, 115, 0.12));
    }

    canvas.dragging {
      cursor: grabbing;
    }

    @media (orientation: portrait) {
      body {
        background:
          radial-gradient(circle at top, rgba(119, 255, 144, 0.14), transparent 42%),
          radial-gradient(circle at bottom, rgba(230, 255, 123, 0.1), transparent 34%),
          linear-gradient(180deg, var(--bg-deep), var(--bg));
      }

      .scene {
        background-size: 24px 24px;
      }
    }

  </style>
</head>
<body>
  <main class="scene">
    <canvas id="scene"></canvas>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");

    const majorSegments = 72;
    const minorSegments = 40;
    const baseMajorRadius = 182;
    const baseMinorRadius = 80;
    const baseCameraDistance = 640;
    const baseProjectionScale = 760;
    const simStepMs = 800;
    const autoRotationSpeed = { x: 0.00009, y: 0.00013, z: 0.00007 };
    const arcballSmoothing = 0.012;
    const arcballSensitivity = 1.65;
    const panSensitivity = 1;
    const zoomStep = 0.0012;
    const minZoom = 0.55;
    const maxZoom = 2.4;
    const lightDirection = normalize({ x: -0.45, y: -0.9, z: 1 });
    const cellTemplates = createCellTemplates();
    const initialViewQuaternion = quaternionFromEuler({ x: -0.78, y: 0.3, z: 0 });

    const state = {
      width: 0,
      height: 0,
      viewQuaternion: initialViewQuaternion,
      targetViewQuaternion: initialViewQuaternion,
      spinRotation: { x: 0, y: 0, z: 0.18 },
      autoRotation: { ...autoRotationSpeed },
      running: true,
      dragging: false,
      dragMode: null,
      lastArcballVector: { x: 0, y: 0, z: 1 },
      lastPointer: { x: 0, y: 0 },
      panOffset: { x: 0, y: 0 },
      zoom: 1,
      generation: 0,
      accumulator: 0,
      grid: [],
      sceneMetrics: {
        majorRadius: baseMajorRadius,
        minorRadius: baseMinorRadius,
        cameraDistance: baseCameraDistance,
        projectionScale: baseProjectionScale
      }
    };

    function createGrid(fillRandom) {
      return Array.from({ length: majorSegments }, () =>
        Array.from({ length: minorSegments }, () => fillRandom ? Math.random() > 0.68 : false)
      );
    }

    function randomizeGrid() {
      state.grid = createGrid(true);
      state.generation = 0;
      state.running = true;
      state.autoRotation = { ...autoRotationSpeed };
    }

    function wrap(value, size) {
      return (value + size) % size;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function nextGeneration() {
      const next = createGrid(false);

      for (let i = 0; i < majorSegments; i += 1) {
        for (let j = 0; j < minorSegments; j += 1) {
          let neighbors = 0;

          for (let di = -1; di <= 1; di += 1) {
            for (let dj = -1; dj <= 1; dj += 1) {
              if (di === 0 && dj === 0) {
                continue;
              }

              if (state.grid[wrap(i + di, majorSegments)][wrap(j + dj, minorSegments)]) {
                neighbors += 1;
              }
            }
          }

          const alive = state.grid[i][j];
          next[i][j] = neighbors === 3 || (alive && neighbors === 2);
        }
      }

      state.grid = next;
      state.generation += 1;
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const shortestSide = Math.min(rect.width, rect.height);
      const isPortrait = rect.height > rect.width;
      const scale = Math.max(0.68, Math.min(1.12, shortestSide / 390));

      state.width = rect.width;
      state.height = rect.height;
      state.sceneMetrics = {
        majorRadius: baseMajorRadius * (isPortrait ? scale * 0.9 : scale),
        minorRadius: baseMinorRadius * (isPortrait ? scale * 0.92 : scale),
        cameraDistance: baseCameraDistance * (isPortrait ? 0.95 : 1),
        projectionScale: baseProjectionScale * (isPortrait ? scale * 0.82 : scale)
      };
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function torusPoint(u, v) {
      const { majorRadius, minorRadius } = state.sceneMetrics;
      const cu = Math.cos(u);
      const su = Math.sin(u);
      const cv = Math.cos(v);
      const sv = Math.sin(v);
      const ring = majorRadius + minorRadius * cv;

      return {
        x: ring * cu,
        y: ring * su,
        z: minorRadius * sv
      };
    }

    function torusNormal(u, v) {
      return normalize({
        x: Math.cos(u) * Math.cos(v),
        y: Math.sin(u) * Math.cos(v),
        z: Math.sin(v)
      });
    }

    function createCellTemplates() {
      const templates = [];
      const du = (Math.PI * 2) / majorSegments;
      const dv = (Math.PI * 2) / minorSegments;

      for (let i = 0; i < majorSegments; i += 1) {
        const u = i * du;
        const uNext = (i + 1) * du;

        for (let j = 0; j < minorSegments; j += 1) {
          const v = j * dv;
          const vNext = (j + 1) * dv;

          templates.push({
            i,
            j,
            cornerAngles: [
              { u, v },
              { u: uNext, v },
              { u: uNext, v: vNext },
              { u, v: vNext }
            ],
            normalAngles: { u: u + du * 0.5, v: v + dv * 0.5 }
          });
        }
      }

      return templates;
    }

    function applyRotation(point, rotation) {
      let { x, y, z } = point;

      const cx = Math.cos(rotation.x || 0);
      const sx = Math.sin(rotation.x || 0);
      let ry = y * cx - z * sx;
      let rz = y * sx + z * cx;
      y = ry;
      z = rz;

      const cy = Math.cos(rotation.y || 0);
      const sy = Math.sin(rotation.y || 0);
      let rx = x * cy + z * sy;
      rz = -x * sy + z * cy;
      x = rx;
      z = rz;

      const cz = Math.cos(rotation.z || 0);
      const sz = Math.sin(rotation.z || 0);
      rx = x * cz - y * sz;
      ry = x * sz + y * cz;

      return { x: rx, y: ry, z };
    }

    function rotatePoint(point) {
      const spun = applyRotation(point, state.spinRotation);
      return applyQuaternion(spun, state.viewQuaternion);
    }

    function normalize(vector) {
      const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
      return {
        x: vector.x / length,
        y: vector.y / length,
        z: vector.z / length
      };
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function cross(a, b) {
      return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x
      };
    }

    function normalizeQuaternion(quaternion) {
      const length = Math.hypot(quaternion.w, quaternion.x, quaternion.y, quaternion.z) || 1;
      return {
        w: quaternion.w / length,
        x: quaternion.x / length,
        y: quaternion.y / length,
        z: quaternion.z / length
      };
    }

    function multiplyQuaternions(a, b) {
      return normalizeQuaternion({
        w: a.w * b.w - a.x * b.x - a.y * b.y - a.z * b.z,
        x: a.w * b.x + a.x * b.w + a.y * b.z - a.z * b.y,
        y: a.w * b.y - a.x * b.z + a.y * b.w + a.z * b.x,
        z: a.w * b.z + a.x * b.y - a.y * b.x + a.z * b.w
      });
    }

    function quaternionFromAxisAngle(axis, angle) {
      const halfAngle = angle * 0.5;
      const sinHalf = Math.sin(halfAngle);
      return normalizeQuaternion({
        w: Math.cos(halfAngle),
        x: axis.x * sinHalf,
        y: axis.y * sinHalf,
        z: axis.z * sinHalf
      });
    }

    function quaternionBetweenVectors(from, to) {
      const axis = cross(from, to);
      const axisLength = Math.hypot(axis.x, axis.y, axis.z);
      const alignment = Math.max(-1, Math.min(1, dot(from, to)));

      if (axisLength < 1e-6) {
        if (alignment > 0.999999) {
          return { w: 1, x: 0, y: 0, z: 0 };
        }

        const fallbackAxis = Math.abs(from.x) < 0.9
          ? normalize(cross(from, { x: 1, y: 0, z: 0 }))
          : normalize(cross(from, { x: 0, y: 1, z: 0 }));
        return quaternionFromAxisAngle(fallbackAxis, Math.PI);
      }

      return quaternionFromAxisAngle(
        {
          x: axis.x / axisLength,
          y: axis.y / axisLength,
          z: axis.z / axisLength
        },
        Math.acos(alignment) * arcballSensitivity
      );
    }

    function quaternionFromEuler(rotation) {
      const qx = quaternionFromAxisAngle({ x: 1, y: 0, z: 0 }, rotation.x || 0);
      const qy = quaternionFromAxisAngle({ x: 0, y: 1, z: 0 }, rotation.y || 0);
      const qz = quaternionFromAxisAngle({ x: 0, y: 0, z: 1 }, rotation.z || 0);
      return multiplyQuaternions(qz, multiplyQuaternions(qy, qx));
    }

    function applyQuaternion(point, quaternion) {
      const qVector = { x: quaternion.x, y: quaternion.y, z: quaternion.z };
      const uv = cross(qVector, point);
      const uuv = cross(qVector, uv);

      return {
        x: point.x + 2 * (quaternion.w * uv.x + uuv.x),
        y: point.y + 2 * (quaternion.w * uv.y + uuv.y),
        z: point.z + 2 * (quaternion.w * uv.z + uuv.z)
      };
    }

    function slerpQuaternions(from, to, t) {
      let target = to;
      let cosine = from.w * to.w + from.x * to.x + from.y * to.y + from.z * to.z;

      if (cosine < 0) {
        cosine = -cosine;
        target = {
          w: -to.w,
          x: -to.x,
          y: -to.y,
          z: -to.z
        };
      }

      if (cosine > 0.9995) {
        return normalizeQuaternion({
          w: from.w + (target.w - from.w) * t,
          x: from.x + (target.x - from.x) * t,
          y: from.y + (target.y - from.y) * t,
          z: from.z + (target.z - from.z) * t
        });
      }

      const theta = Math.acos(Math.max(-1, Math.min(1, cosine)));
      const sinTheta = Math.sin(theta);
      const fromWeight = Math.sin((1 - t) * theta) / sinTheta;
      const toWeight = Math.sin(t * theta) / sinTheta;

      return normalizeQuaternion({
        w: from.w * fromWeight + target.w * toWeight,
        x: from.x * fromWeight + target.x * toWeight,
        y: from.y * fromWeight + target.y * toWeight,
        z: from.z * fromWeight + target.z * toWeight
      });
    }

    function projectPointerToArcball(event) {
      const rect = canvas.getBoundingClientRect();
      const radius = Math.min(rect.width, rect.height) * 0.5 || 1;
      const x = (rect.width * 0.5 - (event.clientX - rect.left)) / radius;
      const y = (rect.height * 0.5 - (event.clientY - rect.top)) / radius;
      const lengthSquared = x * x + y * y;

      if (lengthSquared <= 1) {
        return {
          x,
          y,
          z: Math.sqrt(1 - lengthSquared)
        };
      }

      const scale = 1 / Math.sqrt(lengthSquared);
      return {
        x: x * scale,
        y: y * scale,
        z: 0
      };
    }

    function project(point) {
      const depth = point.z + state.sceneMetrics.cameraDistance;
      const scale = state.sceneMetrics.projectionScale * state.zoom / depth;
      return {
        x: point.x * scale + state.width / 2 + state.panOffset.x,
        y: point.y * scale + state.height / 2 + state.panOffset.y,
        depth
      };
    }

    function shadeColor(base, intensity) {
      const mix = Math.max(0, Math.min(1, intensity));
      const r = Math.round(base[0] * mix);
      const g = Math.round(base[1] * mix);
      const b = Math.round(base[2] * mix);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function drawCell(cell) {
      ctx.beginPath();
      ctx.moveTo(cell.points[0].x, cell.points[0].y);
      for (let index = 1; index < cell.points.length; index += 1) {
        ctx.lineTo(cell.points[index].x, cell.points[index].y);
      }
      ctx.closePath();
      ctx.fillStyle = cell.fill;
      ctx.fill();
      ctx.strokeStyle = cell.stroke;
      ctx.lineWidth = cell.lineWidth;
      ctx.stroke();
    }

    function buildCells() {
      const cells = [];

      for (const template of cellTemplates) {
        const corners = template.cornerAngles.map(({ u, v }) => rotatePoint(torusPoint(u, v)));
        const normal = rotatePoint(torusNormal(template.normalAngles.u, template.normalAngles.v));
        const lightness = Math.max(
          0.12,
          normal.x * lightDirection.x + normal.y * lightDirection.y + normal.z * lightDirection.z
        );
        const projected = corners.map(project);
        const avgDepth = projected.reduce((sum, point) => sum + point.depth, 0) / projected.length;
        const alive = state.grid[template.i][template.j];

        const baseColor = alive ? [142, 255, 128] : [130, 142, 120];
        const altColor = alive ? [245, 255, 129] : [178, 190, 156];
        const mix = 0.65 + lightness * 0.5;
        const fill = shadeColor([
          Math.round(baseColor[0] * 0.72 + altColor[0] * 0.28),
          Math.round(baseColor[1] * 0.72 + altColor[1] * 0.28),
          Math.round(baseColor[2] * 0.72 + altColor[2] * 0.28)
        ], mix);

        cells.push({
          points: projected,
          fill,
          stroke: alive ? "rgba(234, 255, 153, 0.34)" : "rgba(170, 196, 159, 0.14)",
          lineWidth: alive ? 1.15 : 0.75,
          depth: avgDepth
        });
      }

      cells.sort((a, b) => b.depth - a.depth);
      return cells;
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);
      ctx.fillStyle = "rgb(3, 8, 4)";
      ctx.fillRect(0, 0, state.width, state.height);

      const gradient = ctx.createRadialGradient(
        state.width * 0.62,
        state.height * 0.35,
        20,
        state.width * 0.52,
        state.height * 0.52,
        Math.max(state.width, state.height) * 0.7
      );
      gradient.addColorStop(0, "rgba(117, 255, 132, 0.1)");
      gradient.addColorStop(0.4, "rgba(14, 31, 15, 0.18)");
      gradient.addColorStop(1, "rgba(3, 8, 4, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);
    }

    function render() {
      drawBackground();
      const cells = buildCells();
      for (const cell of cells) {
        drawCell(cell);
      }
    }

    function tick(deltaMs) {
      const smoothing = 1 - Math.exp(-arcballSmoothing * deltaMs);
      state.viewQuaternion = slerpQuaternions(state.viewQuaternion, state.targetViewQuaternion, smoothing);

      if (state.running) {
        state.spinRotation.x += state.autoRotation.x * deltaMs;
        state.spinRotation.y += state.autoRotation.y * deltaMs;
        state.spinRotation.z += state.autoRotation.z * deltaMs;
        state.accumulator += deltaMs;

        while (state.accumulator >= simStepMs) {
          state.accumulator -= simStepMs;
          nextGeneration();
        }
      }
    }

    let previousFrame = performance.now();
    function frame(now) {
      const delta = Math.min(32, now - previousFrame);
      previousFrame = now;
      tick(delta);
      render();
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (event.button === 2 || event.button === 1) {
        state.dragMode = "pan";
        state.lastPointer.x = event.clientX;
        state.lastPointer.y = event.clientY;
      } else {
        state.dragMode = "rotate";
        state.lastArcballVector = projectPointerToArcball(event);
      }

      state.dragging = true;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!state.dragging) {
        return;
      }

      if (state.dragMode === "pan") {
        state.panOffset.x += (event.clientX - state.lastPointer.x) * panSensitivity;
        state.panOffset.y += (event.clientY - state.lastPointer.y) * panSensitivity;
        state.lastPointer.x = event.clientX;
        state.lastPointer.y = event.clientY;
        return;
      }

      const currentArcballVector = projectPointerToArcball(event);
      const deltaQuaternion = quaternionBetweenVectors(state.lastArcballVector, currentArcballVector);
      state.targetViewQuaternion = multiplyQuaternions(deltaQuaternion, state.targetViewQuaternion);
      state.lastArcballVector = currentArcballVector;
    });

    function stopDragging(event) {
      state.dragging = false;
      state.dragMode = null;
      canvas.classList.remove("dragging");
      if (event) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", stopDragging);
    canvas.addEventListener("pointerleave", () => {
      state.dragging = false;
      state.dragMode = null;
      canvas.classList.remove("dragging");
    });
    canvas.addEventListener("pointercancel", stopDragging);
    canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      state.zoom = clamp(state.zoom * Math.exp(-event.deltaY * zoomStep), minZoom, maxZoom);
    }, { passive: false });
    canvas.addEventListener("dblclick", () => {
      state.targetViewQuaternion = initialViewQuaternion;
      state.viewQuaternion = initialViewQuaternion;
      state.panOffset.x = 0;
      state.panOffset.y = 0;
      state.zoom = 1;
    });

    window.addEventListener("resize", resize);

    randomizeGrid();
    resize();
    render();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
