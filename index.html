<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection of ideas</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --paper: rgba(18, 18, 22, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --line-strong: rgba(255, 255, 255, 0.8);
      --text: #f8f6f1;
      --muted: rgba(248, 246, 241, 0.78);
      --status-bg: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #f7f7f3 0%, #b6b6b1 22%, #52525a 58%, #000000 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1280px;
      padding: 22px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      line-height: 1.5;
      color: var(--muted);
      max-width: 38rem;
    }

    .projects {
      --topic-columns: 1;
      display: grid;
      grid-template-columns: repeat(var(--topic-columns), minmax(0, 1fr));
      gap: 18px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .projects[data-loading="true"]::before,
    .projects[data-empty="true"]::before {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--status-bg);
      color: var(--muted);
      font-weight: 500;
      border: 1px solid var(--line);
      grid-column: 1 / -1;
    }

    .projects[data-loading="true"]::before {
      content: "Ищу проекты...";
    }

    .projects[data-empty="true"]::before {
      content: "Проекты с index.html не найдены.";
    }

    .topic-column {
      min-width: 0;
    }

    .topic-title {
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-strong);
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .topic-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .project-item + .project-item {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .project-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .project-link {
      display: inline-block;
      min-width: 0;
      text-decoration: none;
      color: var(--text);
      font-size: 1.02rem;
      font-weight: 500;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .project-link:hover {
      color: #ffffff;
      opacity: 0.92;
    }

    .readme-link {
      margin-left: auto;
      min-width: 1.5rem;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: right;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    .readme-link:hover {
      color: #ffffff;
      opacity: 0.92;
    }

    .readme-modal[hidden] {
      display: none;
    }

    .readme-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .readme-dialog {
      width: min(760px, 100%);
      max-height: min(80vh, 900px);
      overflow: auto;
      padding: 24px 24px 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(14, 14, 18, 0.96);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.45);
    }

    .readme-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .readme-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .readme-close {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .readme-close:hover {
      color: #ffffff;
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.06);
    }

    .readme-content {
      color: var(--text);
      font: 0.98rem/1.65 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      word-break: break-word;
    }

    .readme-content > :first-child {
      margin-top: 0;
    }

    .readme-content > :last-child {
      margin-bottom: 0;
    }

    .readme-content h1,
    .readme-content h2,
    .readme-content h3 {
      margin: 1.4em 0 0.55em;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .readme-content h1 {
      font-size: 1.7rem;
    }

    .readme-content h2 {
      font-size: 1.35rem;
    }

    .readme-content h3 {
      font-size: 1.1rem;
    }

    .readme-content p {
      margin: 0 0 1em;
      max-width: none;
      color: var(--text);
    }

    .readme-content ul {
      margin: 0 0 1em;
      padding-left: 1.4em;
    }

    .readme-content li + li {
      margin-top: 0.3em;
    }

    .readme-content code {
      padding: 0.12em 0.38em;
      border-radius: 0.4em;
      background: rgba(255, 255, 255, 0.08);
      font: 0.92em/1.4 "Consolas", "Courier New", monospace;
    }

    .readme-content pre {
      margin: 0 0 1em;
      padding: 14px 16px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .readme-content pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.95em;
    }

    .readme-content a {
      color: #d8e6ff;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.16em;
    }

    .readme-content strong {
      color: #ffffff;
    }

    @media (max-width: 980px) {
      .projects {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px 14px;
      }

      .projects {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Collection of ideas</h1>
    <ol class="projects" data-loading="true"></ol>
  </main>
  <div class="readme-modal" hidden>
    <div class="readme-dialog" role="dialog" aria-modal="true" aria-labelledby="readme-modal-title">
      <div class="readme-header">
        <h2 class="readme-title" id="readme-modal-title">README</h2>
        <button class="readme-close" type="button" aria-label="Закрыть окно">×</button>
      </div>
      <div class="readme-content"></div>
    </div>
  </div>
  <script src="./projects.js"></script>
  <script>
    const projectsContainer = document.querySelector(".projects");
    const readmeModal = document.querySelector(".readme-modal");
    const readmeDialog = document.querySelector(".readme-dialog");
    const readmeTitle = document.querySelector(".readme-title");
    const readmeContent = document.querySelector(".readme-content");
    const readmeCloseButton = document.querySelector(".readme-close");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text);

      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

      return html;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];
      let listItems = [];
      let codeFence = false;
      let codeLines = [];

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }

        html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
        paragraph = [];
      }

      function flushList() {
        if (!listItems.length) {
          return;
        }

        html.push(`<ul>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
        listItems = [];
      }

      function flushCodeBlock() {
        if (!codeLines.length) {
          html.push("<pre><code></code></pre>");
          return;
        }

        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        codeLines = [];
      }

      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          flushParagraph();
          flushList();

          if (codeFence) {
            flushCodeBlock();
            codeFence = false;
          } else {
            codeFence = true;
          }

          continue;
        }

        if (codeFence) {
          codeLines.push(line);
          continue;
        }

        const trimmed = line.trim();

        if (!trimmed) {
          flushParagraph();
          flushList();
          continue;
        }

        const headingMatch = trimmed.match(/^(#{1,3})\s+(.*)$/);

        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
          continue;
        }

        const listMatch = trimmed.match(/^[-*]\s+(.*)$/);

        if (listMatch) {
          flushParagraph();
          listItems.push(listMatch[1]);
          continue;
        }

        paragraph.push(trimmed);
      }

      flushParagraph();
      flushList();

      if (codeFence) {
        flushCodeBlock();
      }

      return html.join("");
    }

    function setReadmeContent(markdownText) {
      readmeContent.innerHTML = renderMarkdown(markdownText);
    }

    function openReadmeModal(project) {
      readmeTitle.textContent = `${project.title}`;
      readmeModal.hidden = false;
      document.body.style.overflow = "hidden";
      setReadmeContent("Загружаю README...");
      readmeCloseButton.focus();

      if (!project.readmePath) {
        setReadmeContent("README пока не добавлен.");
        return;
      }

      fetch(project.readmePath)
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          return response.text();
        })
        .then((text) => {
          if (readmeModal.hidden) {
            return;
          }

          setReadmeContent(text || "README пустой.");
        })
        .catch((error) => {
          console.error(error);

          if (readmeModal.hidden) {
            return;
          }

          setReadmeContent("Не удалось загрузить README. Если страница открыта как файл, запусти её через локальный сервер.");
        });
    }

    function closeReadmeModal() {
      readmeModal.hidden = true;
      document.body.style.overflow = "";
    }

    readmeCloseButton.addEventListener("click", closeReadmeModal);

    readmeModal.addEventListener("click", (event) => {
      if (!readmeDialog.contains(event.target)) {
        closeReadmeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !readmeModal.hidden) {
        closeReadmeModal();
      }
    });

    function groupProjectsByTopic(projects) {
      const topics = new Map();

      for (const project of projects) {
        const topic = project.topic?.trim() || "Без топика";

        if (!topics.has(topic)) {
          topics.set(topic, []);
        }

        topics.get(topic).push(project);
      }

      return Array.from(topics.entries()).sort(([topicA], [topicB]) =>
        topicA.localeCompare(topicB, "ru", { sensitivity: "base" })
      );
    }

    function renderProjects(projects) {
      projectsContainer.innerHTML = "";
      projectsContainer.removeAttribute("data-loading");

      if (!projects.length) {
        projectsContainer.setAttribute("data-empty", "true");
        return;
      }

      projectsContainer.removeAttribute("data-empty");

      const groupedProjects = groupProjectsByTopic(projects);
      projectsContainer.style.setProperty("--topic-columns", String(groupedProjects.length || 1));

      for (const [topic, topicProjects] of groupedProjects) {
        const column = document.createElement("li");
        column.className = "topic-column";

        const title = document.createElement("h2");
        title.className = "topic-title";
        title.textContent = topic;

        const list = document.createElement("ol");
        list.className = "topic-list";

        const sortedProjects = [...topicProjects].sort((a, b) =>
          new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0)
        );

        for (const project of sortedProjects) {
          const item = document.createElement("li");
          item.className = "project-item";

          const row = document.createElement("div");
          row.className = "project-row";

          const link = document.createElement("a");
          link.className = "project-link";
          link.href = project.path;
          link.textContent = project.title;

          row.append(link);

          if (project.readmePath) {
            const readmeLink = document.createElement("button");
            readmeLink.className = "readme-link";
            readmeLink.type = "button";
            readmeLink.textContent = "?";
            readmeLink.setAttribute("aria-label", `Открыть README проекта ${project.title}`);
            readmeLink.addEventListener("click", () => openReadmeModal(project));
            row.append(readmeLink);
          }

          item.append(row);
          list.append(item);
        }

        column.append(title, list);
        projectsContainer.append(column);
      }
    }

    function findProjects() {
      try {
        const projects = Array.isArray(window.PROJECTS) ? window.PROJECTS : [];
        renderProjects(Array.isArray(projects) ? projects : []);
      } catch (error) {
        console.error(error);
        renderProjects([]);
      }
    }

    findProjects();
  </script>
</body>
</html>
