<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сборник идей</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #e2e8f0 0%, var(--bg) 45%, #dbeafe 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.5;
      color: #475569;
    }

    .projects {
      display: grid;
      gap: 12px;
    }

    .project-link {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .project-link:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Сборник идей</h1>
    <p>Здесь собраны мои мини-проекты. Выберите нужный проект:</p>
    <div class="projects">
      <a class="project-link" href="ASCII_3D/index.html">ASCII 3D</a>
      <a class="project-link" href="24_clock/index.html">24 Clock</a>
    </div>
  </main>
</body>
</html>
