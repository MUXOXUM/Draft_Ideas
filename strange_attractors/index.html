<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#101010">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>Strange Attractors</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas aria-hidden="true"></canvas>
  <div class="attractor-label" aria-live="polite">
    <p class="attractor-label__title">Lorenz Attractor</p>
    <p class="attractor-label__hint">← → or A / D</p>
  </div>
  <div class="camera-mode-panel" aria-hidden="true">
    <p class="camera-mode-panel__title">CAMERA MODE</p>
    <p class="camera-mode-panel__controls">LMB: rotate, RMB/MMB: move, Wheel: size, Double LMB: reset, Enter: log, C: off</p>
    <p class="camera-mode-panel__values"></p>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
